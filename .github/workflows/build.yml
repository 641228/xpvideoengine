name: Build XP Video Engine EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.4.4 (XP Compatible)
        uses: actions/setup-python@v5
        with:
          python-version: '3.4.4'
          architecture: 'x86'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Flask==1.1.2 PyYAML==3.12 pyinstaller==3.6

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller -w -F --noupx --clean app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xp-video-engine
          path: dist/app.exe
